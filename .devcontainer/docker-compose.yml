services:
  workspace:
    image: mcr.microsoft.com/devcontainers/base:bookworm
    volumes:
      - ..:/home/vscode/workspace:cached
    command: sleep infinity

  redis:
    image: redis:8-bookworm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
